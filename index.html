    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      color: var(--cream);
      background: var(--ink);
    }

    .page-shell {
      width: 100%;
      min-height: calc(100 * min(var(--vh, 1vh), 1vh));
      background:
        linear-gradient(rgba(184,242,200,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(184,242,200,0.035) 1px, transparent 1px),
        radial-gradient(circle at top right, rgba(125,217,155,0.08), transparent 30%),
        var(--ink);
      background-size: 42px 42px, 42px 42px, auto, auto;
    }

    .serif { font-family: 'Fraunces', serif; }

    .glass-panel {
      background: linear-gradient(180deg, rgba(22,31,25,0.98), rgba(16,23,19,0.98));
      border: 1px solid var(--line);
      box-shadow: 0 24px 80px rgba(0,0,0,0.28);
    }

    .section-tab {
      border: 1px solid transparent;
      transition: all .24s ease;
    }

    .section-tab:hover {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.06);
    }

    .section-tab.active {
      background: rgba(184,242,200,0.08);
      border-color: rgba(184,242,200,0.24);
    }

    .section-tab.active .tab-index {
      background: var(--accent);
      color: #0c130f;
    }

    .section-tab.active .tab-title {
      color: #f5fff8;
    }

    .tab-index {
      background: rgba(255,255,255,0.05);
      color: #aab6af;
      transition: all .24s ease;
    }

    .question-panel {
      display: none;
      animation: reveal .34s ease both;
    }

    .question-panel.active {
      display: block;
    }

    .review-panel {
      display: none;
      animation: reveal .34s ease both;
    }

    .review-panel.active {
      display: block;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    textarea, input {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.10);
      color: #eef8f1;
      outline: none;
      transition: border-color .2s ease, background .2s ease, box-shadow .2s ease;
    }

    textarea::placeholder, input::placeholder {
      color: #68766e;
    }

    textarea:focus, input:focus {
      border-color: rgba(184,242,200,0.7);
      background: rgba(255,255,255,0.04);
      box-shadow: 0 0 0 3px rgba(184,242,200,0.08);
    }

    .primary-btn, .secondary-btn {
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .primary-btn:hover, .secondary-btn:hover {
      transform: translateY(-1px);
    }

    .primary-btn:focus-visible, .secondary-btn:focus-visible, .section-tab:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .summary-box {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      letter-spacing: 0.3px;

    }

    @media (max-width: 600px) {
      .sidebar {
        grid-template-columns: 1fr;
      }

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();

      const tabs = Array.from(document.querySelectorAll('.section-tab'));
      const panels = Array.from(document.querySelectorAll('.question-panel'));
      const stepCounter = document.getElementById('stepCounter');
      const stepName = document.getElementById('stepName');
      const progressBar = document.getElementById('progressBar');
      const backBtn = document.getElementById('backBtn');
      const nextBtn = document.getElementById('nextBtn');
      const sendBtn = document.getElementById('sendBtn');
      const editBtn = document.getElementById('editBtn');
      const reviewPanel = document.getElementById('reviewPanel');
      const summaryBox = document.getElementById('summaryBox');
      const statusMessage = document.getElementById('statusMessage');

      const sectionNames = [
        'Founder Vision',
        'Real Service Breakdown',
        'Actual Methodology',
        'Past Projects',
        'Pricing Philosophy',
        'Client Qualification',
        'Tech Stack',
        'Principles',
        'Future Vision',
        'Operating System'
      ];

      let currentStep = 0;
      let inReview = false;

      function updateView() {
        inReview = false;
        reviewPanel.classList.remove('active');

        panels.forEach((panel, index) => panel.classList.toggle('active', index === currentStep));
        tabs.forEach((tab, index) => tab.classList.toggle('active', index === currentStep));

        stepCounter.textContent = String(currentStep + 1).padStart(2, '0') + ' / 10';
        stepName.textContent = sectionNames[currentStep];
        progressBar.style.width = ((currentStep + 1) * 10) + '%';

        backBtn.classList.toggle('invisible', currentStep === 0);
        nextBtn.classList.remove('hidden');
        sendBtn.classList.add('hidden');
        editBtn.classList.add('hidden');

        if (currentStep === panels.length - 1) {
          nextBtn.querySelector('span').textContent = 'Review answers';
        } else {
          nextBtn.querySelector('span').textContent = 'Continue';
        }

        statusMessage.classList.add('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function buildSummary() {
        const fields = Array.from(document.querySelectorAll('textarea[data-key]'));
        let sections = {};
        
        // Group answers by section
        fields.forEach(field => {
          const value = field.value.trim();
          if (value) {
            const keyParts = field.dataset.key.split(' — ');
            const sectionTitle = keyParts[0];
            const questionTitle = keyParts[1] || '';
            
            if (!sections[sectionTitle]) {
              sections[sectionTitle] = [];
            }
            sections[sectionTitle].push({
              question: questionTitle,
              answer: value
            });
          }
        });

        // Build formatted summary
        let output = 'BUSINESS BOTS MASTER BRAIN\n';
        output += 'Founder Intake Ticket\n\n';
        output += 'Hello,\n\n';
        output += 'Here is the completed Business Bots founder intake ticket.\n\n';
        output += '------------------------------\n\n';

        let questionNumber = 1;
        Object.entries(sections).forEach(([sectionTitle, items]) => {
          items.forEach(item => {
            output += questionNumber + '. ' + sectionTitle + ' — ' + item.question + '\n\n';
            output += 'Answer:\n' + item.answer + '\n\n';
            output += '------------------------------\n\n';
            questionNumber++;
          });
        });

        output += 'Sent from the Business Bots Master Brain Intake Form.';

        if (Object.keys(sections).length === 0) {
          output = 'BUSINESS BOTS MASTER BRAIN\nFounder Intake Ticket\n\nNo answers have been entered yet.';
        }

        return output;
      }

      function showReview() {
        inReview = true;
        panels.forEach(panel => panel.classList.remove('active'));
        tabs.forEach(tab => tab.classList.remove('active'));
        reviewPanel.classList.add('active');

        stepCounter.textContent = 'FINAL REVIEW';
        stepName.textContent = 'Ready to send';
        progressBar.style.width = '100%';

        summaryBox.textContent = buildSummary();

        backBtn.classList.remove('invisible');
        nextBtn.classList.add('hidden');
        sendBtn.classList.remove('hidden');
        editBtn.classList.remove('hidden');
        statusMessage.classList.add('hidden');

        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      tabs.forEach((tab, index) => {
        tab.addEventListener('click', () => {
          currentStep = index;
          updateView();
        });
      });

      nextBtn.addEventListener('click', () => {
        if (currentStep < panels.length - 1) {
          currentStep++;
          updateView();
        } else {
          showReview();
        }
      });

      backBtn.addEventListener('click', () => {
        if (inReview) {
          currentStep = panels.length - 1;
          updateView();
        } else if (currentStep > 0) {
          currentStep--;
          updateView();
        }
      });

      editBtn.addEventListener('click', () => {
        currentStep = 0;
        updateView();
      });

      sendBtn.addEventListener('click', () => {
        const rawNumber = document.getElementById('whatsappNumber').value.trim();
        const cleanNumber = rawNumber.replace(/[^\d]/g, '');

        if (!cleanNumber) {
          statusMessage.textContent = 'Please add a WhatsApp number before sending.';
          statusMessage.classList.remove('hidden');
          return;
        }

        const message = buildSummary();
        const encodedMessage = encodeURIComponent(message);
        const url = `https://wa.me/${cleanNumber}?text=${encodedMessage}`;
        window.open(url, '_blank', 'noopener,noreferrer');
        statusMessage.textContent = 'WhatsApp opened in a new tab with your structured summary.';
        statusMessage.classList.remove('hidden');
      });

      updateView();
    });
  </script>
